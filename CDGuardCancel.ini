[General]
; Enable or disable the mod (1=on, 0=off)
Enabled=1

; How long after your last attack (RB/RT) the mod stays active, in milliseconds.
; The mod only forces guard cancel during this window after attacking.
; Outside this window, LB works normally (clean guard, no side effects).
; Default: 350. Increase if guard cancel doesn't trigger reliably.
; Lower if it interferes with non-combat actions.
; Changes take effect within 3 seconds — no restart needed.
CombatTimeoutMs=350

[Debug]
; Enable logging to CDGuardCancel.log in the bin64 folder (1=on, 0=off)
LogEnabled=0
