[General]
; Enable or disable the mod (1=on, 0=off)
Enabled=1

; Window after your last attack where guard cancel is active (milliseconds)
; Default: 350. Increase if guard cancel doesn't trigger reliably.
; Lower if it interferes with non-combat actions.
; Changes take effect within 3 seconds — no restart needed.
CombatTimeoutMs=350

[Keyboard]
; Virtual key codes for keyboard/mouse input (hex or decimal).
; These work alongside controller — both are active simultaneously.
; Changes take effect within 3 seconds — no restart needed.
;
; Default Crimson Desert keybindings:
;   Guard  = Ctrl        (0x11)
;   Light  = Left Click  (0x01)
;   Heavy  = Right Click (0x02)
;
; Common VK codes for rebinds:
;   0x01 = Left Mouse    0x02 = Right Mouse   0x04 = Middle Mouse
;   0x05 = Mouse 4       0x06 = Mouse 5
;   0x10 = Shift          0x11 = Ctrl          0x12 = Alt
;   0x20 = Space          0x09 = Tab           0x14 = Caps Lock
;   0x51 = Q              0x45 = E             0x46 = F
;   0x52 = R              0x43 = C             0x56 = V
;   Full list: https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
;
GuardKey=0x11
LightAttackKey=0x01
HeavyAttackKey=0x02

[Debug]
; Enable logging to CDGuardCancel.log in bin64 (1=on, 0=off)
LogEnabled=0
